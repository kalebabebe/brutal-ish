name: Build PBW

# Builds the watchface and uploads the .pbw as a downloadable artifact.
# After a run finishes, open the run from the "Actions" tab and download
# the "brutal-pbw" artifact, then side-load the .pbw with the Pebble app
# on your iPhone.

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build inside dmorgan81/rebble:4.3 — an Ubuntu 18.04 image with the
      # Pebble SDK 4.3 + pebble-tool preinstalled and configured (no fragile
      # SDK downloads). The image entrypoint is `pebble`, so the args below
      # run `pebble build` with the repo mounted at /work. fixuid in the
      # image maps file ownership to the host runner user.
      - name: Build watchface (.pbw)
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$PWD":/work \
            dmorgan81/rebble:4.3 build

      - name: Upload PBW
        uses: actions/upload-artifact@v4
        with:
          name: brutal-pbw
          path: build/*.pbw
          if-no-files-found: error
